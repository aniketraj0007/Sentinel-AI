<!-- views/password.html -->
<div class="view-header">
    <div class="vh-left">
        <h1 class="text-neon">Security Settings</h1>
        <p class="text-secondary text-sm">Update your password to keep your SecurePay-AI account protected.</p>
    </div>
</div>

<div class="settings-container-inner">
    <div class="settings-card animate-fade-in">
        <div class="card-header-flex">
            <div class="card-icon-box" style="color: #ef4444; background: rgba(239, 68, 68, 0.1);"><i data-lucide="shield-alert"></i></div>
            <h3 class="card-title">Change Password</h3>
        </div>
        
        <form id="password-form" class="mt-4">
            <!-- 🔑 Old Password -->
            <div class="profile-input-group">
                <label for="old-pwd">Current Password</label>
                <div class="input-with-icon">
                    <i data-lucide="key"></i>
                    <input type="password" id="old-pwd" class="profile-input" placeholder="••••••••" required>
                </div>
                <p class="text-[10px] text-secondary mt-1 ml-2">Verification required for sensitive changes.</p>
            </div>

            <hr class="border-white/5 my-6">

            <!-- 🆕 New Password -->
            <div class="profile-input-group">
                <label for="new-pwd">New Secure Password</label>
                <div class="input-with-icon">
                    <i data-lucide="lock"></i>
                    <input type="password" id="new-pwd" class="profile-input" placeholder="Min. 8 characters" required>
                </div>
            </div>

            <!-- ✅ Confirm Password -->
            <div class="profile-input-group mt-4">
                <label for="confirm-pwd">Confirm New Password</label>
                <div class="input-with-icon">
                    <i data-lucide="shield-check"></i>
                    <input type="password" id="confirm-pwd" class="profile-input" placeholder="Repeat new password" required>
                </div>
            </div>

            <!-- Action Area -->
            <div class="settings-footer mt-8">
                <button type="button" class="btn-cancel-settings" onclick="switchView('settings')">Cancel</button>
                <button type="submit" class="btn-save-settings" id="btn-update-pwd">
                    <i data-lucide="refresh-cw"></i> Update Password
                </button>
            </div>
        </form>
    </div>
    
    <!-- Pro Tip Card -->
    <div class="settings-card animate-fade-in mt-4" style="animation-delay: 0.1s; border-color: rgba(168, 85, 247, 0.2);">
        <div class="flex items-start gap-4">
            <div class="p-2 bg-purple-500/10 rounded-lg text-purple-400">
                <i data-lucide="lightbulb" class="icon-sm"></i>
            </div>
            <div>
                <h4 class="text-sm font-bold text-white mb-1">Security Pro-Tip</h4>
                <p class="text-xs text-secondary leading-relaxed">
                    Use a combination of uppercase letters, symbols, and numbers. 
                    Passwords like <span class="text-neon">ScrPay@2024!</span> are much harder for bots to crack.
                </p>
            </div>
        </div>
    </div>
</div>
